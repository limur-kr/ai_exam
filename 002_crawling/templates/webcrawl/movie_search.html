<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영화 정보 가져오기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            naver: {
              green:  '#03C75A',
              dark:   '#00A649',
              light:  '#E9FFF0',
              navy:   '#1A1A3E',
            }
          },
          fontFamily: {
            sans: ['Noto Sans KR', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── 기본 초기화 ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #F4F6F8; }

    /* ── 스크롤바 ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F0F0F0; }
    ::-webkit-scrollbar-thumb { background: #C0C0C0; border-radius: 3px; }

    /* ── 상단 헤더 ── */
    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 58px;
      background: #03C75A;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(3,199,90,0.3);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 34px; height: 34px; background: #fff; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .btn-logout {
      padding: 7px 18px; font-size: 13px; font-weight: 500;
      color: #03C75A; background: #fff; border: none;
      border-radius: 20px; cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { background: #E9FFF0; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.12); }

    /* ── 레이아웃 ── */
    .layout { display: flex; margin-top: 58px; min-height: calc(100vh - 58px); }

    /* ── 사이드바 ── */
    .sidebar {
      width: 210px; flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #E8E8E8;
      padding: 20px 0;
      position: fixed; top: 58px; left: 0; bottom: 0;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 600; color: #A0A0A0;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 0 20px 10px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 500;
      color: #555; cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .18s;
      position: relative;
    }
    .sidebar-item:hover  { background: #F8FFF9; color: #03C75A; border-left-color: #B8F0D0; }
    .sidebar-item.active { background: #EDFFF5; color: #03C75A; border-left-color: #03C75A; font-weight: 600; }
    .sidebar-item .icon  { font-size: 17px; }

    /* ── 메인 콘텐츠 ── */
    .main {
      margin-left: 210px;
      flex: 1;
      padding: 30px 32px;
    }

    /* ── 페이지 제목 ── */
    .page-title {
      font-size: 22px; font-weight: 700; color: #1A1A3E;
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 10px;
    }
    .page-title::before {
      content: ''; display: block;
      width: 4px; height: 22px; background: #03C75A; border-radius: 2px;
    }

    /* ── 검색 박스 ── */
    .search-wrap {
      display: flex; gap: 0;
      background: #fff;
      border: 2px solid #03C75A;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 2px 12px rgba(3,199,90,.12);
    }
    .search-input {
      flex: 1; border: none; outline: none;
      padding: 14px 18px; font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif; color: #333;
      background: transparent;
    }
    .search-input::placeholder { color: #B0B0B0; }
    .btn-search {
      padding: 14px 28px; background: #03C75A; color: #fff;
      font-size: 15px; font-weight: 600; border: none; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background .18s;
      white-space: nowrap;
    }
    .btn-search:hover { background: #00A649; }

    /* ── 결과 섹션 제목 ── */
    .section-label {
      font-size: 13px; font-weight: 600; color: #888;
      margin-bottom: 14px; letter-spacing: .5px;
    }

    /* ── 카드 그리드 ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    /* ── 카드 ── */
    .movie-card {
      background: #fff; border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .movie-card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(0,0,0,.13); }
    .poster-wrap {
      position: relative; overflow: hidden;
      aspect-ratio: 2/3; background: #E8E8E8;
    }
    .poster-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .3s;
    }
    .movie-card:hover .poster-wrap img { transform: scale(1.05); }
    .poster-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #B0B0B0; font-size: 30px; gap: 6px;
    }
    .poster-placeholder span { font-size: 11px; font-weight: 500; }
    .card-body { padding: 10px 10px 12px; }
    .card-title {
      font-size: 13px; font-weight: 600; color: #1A1A3E;
      margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.4;
    }
    .card-date { font-size: 11px; color: #9E9E9E; }
    .btn-save {
      display: block; width: calc(100% - 20px);
      margin: 0 10px 10px;
      padding: 8px; text-align: center;
      background: #03C75A; color: #fff;
      font-size: 13px; font-weight: 600;
      border: none; border-radius: 6px;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
      transition: background .18s;
    }
    .btn-save:hover { background: #00A649; }

    /* ── 빈 상태 / 로딩 ── */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px;
      color: #C0C0C0; font-size: 14px; gap: 14px;
    }
    .empty-icon { font-size: 56px; }
    .spinner-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid #E8E8E8;
      border-top-color: #03C75A;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 저장 영화 보기 탭 ── */
    .saved-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; gap: 14px; color: #C0C0C0;
    }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: #FF5252; color: #fff;
      font-size: 10px; font-weight: 700; border-radius: 9px;
      position: absolute; top: 10px; right: 16px;
    }

    /* ── 푸터 구분선 ── */
    .divider { height: 1px; background: #ECECEC; margin: 24px 0; }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px 16px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
    }
  </style>
</head>
<body>

{% include "./inc_head.html" %}

  <!-- ╔══════════ 레이아웃 ══════════╗ -->
  <div class="layout">

    {% include "./inc_left.html" %}

    <!-- ── 우측 메인 콘텐츠 ── -->
    <main class="main">

      <!-- ════ 영화 API 검색 탭 ════ -->
      <section id="tab-search">
        <h1 class="page-title">영화 정보 가져오기</h1>

        <!-- 검색창 -->
        <form action="/webcrawl/qry_search/" method="get">
        <div class="search-wrap">
          <input
            name="qry"
            class="search-input"
            id="search-input"
            type="text"
            placeholder="검색어를 입력하세요."
            onkeydown="if(event.key==='Enter') doSearch()"
            value="{{searchKeyword}}"
          />
          <button type="submit" class="btn-search">검색</button>
          <a href="/webcrawl/all_search/" class="btn-search">전체검색</a>
        </div>
        </form>

        <!-- 결과 영역 -->
        <div id="result-area">
          <!-- 기본 추천 목록 -->
          <div id="result-area">
          <!-- 기본 추천 목록 -->
          <p class="section-label">인기 영화</p>
          <div class="card-grid">

        {% for data in qryData.Search %}
        <div class="movie-card">
          <div class="poster-wrap"><img src="{{data.Poster}}" alt="어벤져스: 엔드게임" onerror="this.parentElement.innerHTML=placeholderHTML()"></div>
          <div class="card-body">
            <div class="card-title">{{data.Title}}</div>
            <div class="card-date">{{data.Year}}</div>
          </div>
          <a href="/webcrawl/save_data/{{data.imdbID}}/" class="btn-save" style="" onclick="saveMovie({&quot;id&quot;:&quot;tt0816692b&quot;,&quot;title&quot;:&quot;어벤져스: 엔드게임&quot;,&quot;year&quot;:&quot;2019&quot;,&quot;poster&quot;:&quot;https://m.media-amazon.com/images/M/MV5BMTc5MDE2ODcwNV5BMl5BanBnXkFtZTgwMzI2NzQ2NzM@._V1_SX300.jpg&quot;,&quot;date&quot;:&quot;4월 26, 2019&quot;}, this)">
            저장
          </a>
        </div>
        {% endfor %}
     
        </div>
        </div>
        </div>
      </section>

      <!-- ════ 저장 영화 보기 탭 ════ -->
      <section id="tab-saved" style="display:none">
        <h1 class="page-title">저장 영화 보기</h1>
        <div id="saved-grid-wrap">
          <div class="saved-empty">
            <div style="font-size:52px">📭</div>
            <p>저장된 영화가 없습니다.</p>
            <p style="font-size:12px">영화 API 검색에서 영화를 저장해보세요!</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <!-- ╔══════════ JavaScript ══════════╗ -->
  <script>
    /* ──────────────── 상태 ──────────────── */
    let savedMovies = JSON.parse(localStorage.getItem('cinehub_saved') || '[]');

    /* ──────────────── 기본 인기 영화 (목 데이터) ──────────────── */
    const popularMovies = [
      { id:'tt0816692', title:'인터스텔라',       year:'2014', poster:'https://m.media-amazon.com/images/M/MV5BZjdkOTU3MDktN2IxOS00OGEyLWFmMzktY2VhNWM4Y2M1ZWFiXkEyXkFqcGdeQXVyMTMxODk2OTU@._V1_SX300.jpg', date:'11월 6, 2014' },
      { id:'tt0816692b', title:'어벤져스: 엔드게임', year:'2019', poster:'https://m.media-amazon.com/images/M/MV5BMTc5MDE2ODcwNV5BMl5BanBnXkFtZTgwMzI2NzQ2NzM@._V1_SX300.jpg', date:'4월 26, 2019' },
      { id:'tt1375666',  title:'인셉션',           year:'2010', poster:'https://m.media-amazon.com/images/M/MV5BMjAxMzY3NjcxNF5BMl5BanBnXkFtZTcwNTI5OTM0Mw@@._V1_SX300.jpg', date:'7월 21, 2010' },
      { id:'tt0468569',  title:'다크 나이트',       year:'2008', poster:'https://m.media-amazon.com/images/M/MV5BMTMxNTMwODM0NF5BMl5BanBnXkFtZTcwODAyMTk2Mw@@._V1_SX300.jpg', date:'7월 18, 2008' },
      { id:'tt0110912',  title:'펄프 픽션',         year:'1994', poster:'https://m.media-amazon.com/images/M/MV5BNGNhMDIzZTUtNTBlZi00MTRlLWFjM2ItYzViMjE3YzI5MjljXkEyXkFqcGdeQXVyNzkwMjQ5NzM@._V1_SX300.jpg', date:'5월 23, 1994' },
      { id:'tt0109830',  title:'포레스트 검프',      year:'1994', poster:'https://m.media-amazon.com/images/M/MV5BNWIwODRlZTUtY2U3ZS00Yzg1LWJhNzYtMmZiYmEyNmU1NjMzXkEyXkFqcGdeQXVyMTQxNzMzNDI@._V1_SX300.jpg', date:'7월 6, 1994' },
      { id:'tt0120737',  title:'반지의 제왕',        year:'2001', poster:'https://m.media-amazon.com/images/M/MV5BN2EyZjM3NzUtNWUzMi00MTgxLWI0NTctMzY4M2VlOTdjZWRiXkEyXkFqcGdeQXVyNDUzOTQ5MjY@._V1_SX300.jpg', date:'12월 19, 2001' },
      { id:'tt0133093',  title:'매트릭스',           year:'1999', poster:'https://m.media-amazon.com/images/M/MV5BNzQzOTk3OTAtNDQ0Zi00ZTVlLTM5YTctZjgwM2EwY2Q1NmQzXkEyXkFqcGdeQXVyNjU0OTQ0OTY@._V1_SX300.jpg', date:'3월 31, 1999' },
    ];

    /* ──────────────── 초기 렌더 ──────────────── */
    window.onload = () => {
      renderGrid(popularMovies, 'movie-grid');
      updateBadge();
    };

    /* ──────────────── 탭 전환 ──────────────── */
    function switchTab(tab) {
      document.getElementById('tab-search').style.display = tab === 'search' ? '' : 'none';
      document.getElementById('tab-saved').style.display  = tab === 'saved'  ? '' : 'none';
      document.getElementById('menu-search').classList.toggle('active', tab === 'search');
      document.getElementById('menu-saved').classList.toggle('active', tab === 'saved');
      if (tab === 'saved') renderSaved();
    }

    /* ──────────────── 검색 ──────────────── */
    async function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) {
        Swal.fire({ icon: 'warning', title: '검색어 입력', text: '검색어를 입력해주세요.', confirmButtonColor: '#03C75A' });
        return;
      }
      const area = document.getElementById('result-area');
      area.innerHTML = `
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <p style="color:#A0A0A0;font-size:14px">영화 정보를 가져오는 중...</p>
        </div>`;

      try {
        const res  = await fetch(`https://www.omdbapi.com/?apikey=trilogy&s=${encodeURIComponent(q)}&type=movie`);
        const data = await res.json();
        if (data.Response === 'True') {
          const movies = data.Search.map(m => ({
            id:     m.imdbID,
            title:  m.Title,
            year:   m.Year,
            poster: m.Poster !== 'N/A' ? m.Poster : null,
            date:   m.Year,
          }));
          area.innerHTML = `<p class="section-label">"${q}" 검색 결과 &nbsp;·&nbsp; ${movies.length}건</p><div class="card-grid" id="movie-grid"></div>`;
          renderGrid(movies, 'movie-grid');
        } else {
          area.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">🎭</div>
              <p style="font-weight:600;color:#555">"${q}"에 대한 검색 결과가 없습니다.</p>
              <p>다른 검색어를 입력해보세요.</p>
            </div>`;
        }
      } catch (e) {
        area.innerHTML = `
          <p class="section-label">인기 영화</p>
          <div class="card-grid" id="movie-grid"></div>`;
        renderGrid(popularMovies, 'movie-grid');
        Swal.fire({ icon:'error', title:'오류', text:'검색 중 문제가 발생했습니다. 기본 목록을 표시합니다.', confirmButtonColor:'#03C75A' });
      }
    }

    /* ──────────────── 카드 렌더 ──────────────── */
    function renderGrid(movies, containerId) {
      const grid = document.getElementById(containerId);
      if (!grid) return;
      grid.innerHTML = movies.map(m => cardHTML(m)).join('');
    }

    function cardHTML(m) {
      const isSaved = savedMovies.some(s => s.id === m.id);
      const imgTag  = m.poster
        ? `<img src="${m.poster}" alt="${m.title}" onerror="this.parentElement.innerHTML=placeholderHTML()">`
        : `<div class="poster-placeholder">🎬<span>No Image</span></div>`;
      return `
        <div class="movie-card">
          <div class="poster-wrap">${imgTag}</div>
          <div class="card-body">
            <div class="card-title">${m.title}</div>
            <div class="card-date">${m.date || m.year}</div>
          </div>
          <button class="btn-save" style="${isSaved ? 'background:#9E9E9E' : ''}"
            onclick='saveMovie(${JSON.stringify(m).replace(/'/g,"&#39;")}, this)'>
            ${isSaved ? '✓ 저장됨' : '저장'}
          </button>
        </div>`;
    }

    function placeholderHTML() {
      return `<div class="poster-placeholder">🎬<span>No Image</span></div>`;
    }

    /* ──────────────── 저장 ──────────────── */
    function saveMovie(movie, btn) {
      if (savedMovies.some(s => s.id === movie.id)) {
        Swal.fire({ icon:'info', title:'이미 저장됨', text:`"${movie.title}"은 이미 저장되어 있습니다.`, confirmButtonColor:'#03C75A' });
        return;
      }
      savedMovies.push(movie);
      localStorage.setItem('cinehub_saved', JSON.stringify(savedMovies));
      updateBadge();

      btn.textContent = '✓ 저장됨';
      btn.style.background = '#9E9E9E';

      Swal.fire({
        icon: 'success',
        title: '저장 완료!',
        html: `<b>${movie.title}</b>이(가) 저장되었습니다.`,
        confirmButtonColor: '#03C75A',
        timer: 1800,
        showConfirmButton: false,
        position: 'top-end',
        toast: true,
      });
    }

    /* ──────────────── 저장 영화 렌더 ──────────────── */
    function renderSaved() {
      const wrap = document.getElementById('saved-grid-wrap');
      if (savedMovies.length === 0) {
        wrap.innerHTML = `
          <div class="saved-empty">
            <div style="font-size:52px">📭</div>
            <p>저장된 영화가 없습니다.</p>
            <p style="font-size:12px">영화 API 검색에서 영화를 저장해보세요!</p>
          </div>`;
        return;
      }
      wrap.innerHTML = `
        <p class="section-label">저장된 영화 &nbsp;·&nbsp; ${savedMovies.length}편</p>
        <div class="card-grid" id="saved-grid"></div>`;
      const grid = document.getElementById('saved-grid');
      grid.innerHTML = savedMovies.map(m => savedCardHTML(m)).join('');
    }

    function savedCardHTML(m) {
      const imgTag = m.poster
        ? `<img src="${m.poster}" alt="${m.title}" onerror="this.parentElement.innerHTML=placeholderHTML()">`
        : `<div class="poster-placeholder">🎬<span>No Image</span></div>`;
      return `
        <div class="movie-card">
          <div class="poster-wrap">${imgTag}</div>
          <div class="card-body">
            <div class="card-title">${m.title}</div>
            <div class="card-date">${m.date || m.year}</div>
          </div>
          <button class="btn-save" style="background:#FF5252"
            onclick='deleteMovie("${m.id}")'>
            🗑 삭제
          </button>
        </div>`;
    }

    function deleteMovie(id) {
      const movie = savedMovies.find(m => m.id === id);
      Swal.fire({
        title: '삭제하시겠습니까?',
        html: `<b>${movie?.title}</b>을(를) 삭제합니다.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#FF5252',
        cancelButtonColor: '#9E9E9E',
        confirmButtonText: '삭제',
        cancelButtonText: '취소',
      }).then(result => {
        if (result.isConfirmed) {
          savedMovies = savedMovies.filter(m => m.id !== id);
          localStorage.setItem('cinehub_saved', JSON.stringify(savedMovies));
          updateBadge();
          renderSaved();
          Swal.fire({ icon:'success', title:'삭제 완료', timer:1200, showConfirmButton:false, toast:true, position:'top-end' });
        }
      });
    }

    /* ──────────────── 배지 ──────────────── */
    function updateBadge() {
      const badge = document.getElementById('saved-badge');
      if (savedMovies.length > 0) {
        badge.style.display = '';
        badge.textContent   = savedMovies.length;
      } else {
        badge.style.display = 'none';
      }
    }

    /* ──────────────── 로그아웃 ──────────────── */
    function handleLogout() {
      Swal.fire({
        title: '로그아웃',
        text: '정말 로그아웃 하시겠습니까?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#03C75A',
        cancelButtonColor: '#9E9E9E',
        confirmButtonText: '로그아웃',
        cancelButtonText: '취소',
      }).then(r => {
        if (r.isConfirmed) {
          Swal.fire({ icon:'success', title:'로그아웃 되었습니다.', timer:1500, showConfirmButton:false });
        }
      });
    }

    /* ──────────────── 도움말 ──────────────── */
    function showInfo() {
      Swal.fire({
        title: '📖 도움말',
        html: `
          <div style="text-align:left;font-size:14px;line-height:1.8">
            <b>영화 API 검색</b><br>
            검색어를 입력하면 OMDB API를 통해 영화 정보를 가져옵니다.<br><br>
            <b>저장 영화 보기</b><br>
            저장 버튼을 누른 영화를 확인하고 관리할 수 있습니다.<br><br>
            <b>데이터 출처</b><br>
            OMDB API (The Open Movie Database)
          </div>`,
        confirmButtonColor: '#03C75A',
      });
    }
  </script>
</body>
</html>
